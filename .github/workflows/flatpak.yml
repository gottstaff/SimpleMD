name: Flatpak

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flatpak-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Build Flatpak
        env:
          FLATPAK_USER: "1"
        run: ./scripts/build-flatpak.sh

      - name: Prepare GitHub Pages layout
        run: |
          mkdir -p deploy
          touch deploy/.nojekyll
          cp packaging/pages/index.html deploy/index.html
          cp packaging/flatpak/simplemd.flatpakrepo deploy/
          cp -a packaging/flatpak/repo deploy/repo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
